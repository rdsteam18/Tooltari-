[[redirects]]
  from = "/pdf-tools/:tool"
  to = "/pdf-tools/:tool.html"
  status = 200

[[redirects]]
  from = "/image-tools/:tool"
  to = "/image-tools/:tool.html"
  status = 200

[[redirects]]
  from = "/developer-tools/:tool"
  to = "/developer-tools/:tool.html"
  status = 200

[[redirects]]
  from = "/text-tools/:tool"
  to = "/text-tools/:tool.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
